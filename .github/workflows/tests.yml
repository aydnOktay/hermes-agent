name: Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

permissions:
  contents: read

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Select PR-focused test targets
        if: github.event_name == 'pull_request'
        id: pr_tests
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import fnmatch
          import os
          import subprocess
          from pathlib import Path

          base = os.environ["BASE_SHA"]
          head = os.environ["HEAD_SHA"]

          diff = subprocess.check_output(
              ["git", "diff", "--name-only", f"{base}..{head}"],
              text=True,
          ).splitlines()

          changed_tests = []
          source_files = []
          for path in diff:
              p = Path(path)
              if path.startswith("tests/") and path.endswith(".py"):
                  changed_tests.append(path)
                  continue
              if (
                  path.endswith(".py")
                  and not path.startswith("tests/")
                  and not path.startswith("docs/")
              ):
                  source_files.append(p)

          test_files = [str(p).replace("\\", "/") for p in Path("tests").rglob("test_*.py")]
          selected = set(changed_tests)
          for src in source_files:
              stem = src.stem
              direct = f"tests/test_{stem}.py"
              if Path(direct).exists():
                  selected.add(direct)
              for candidate in test_files:
                  if fnmatch.fnmatch(candidate, f"tests/**/test_{stem}.py"):
                      selected.add(candidate)

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              if selected:
                  joined = " ".join(sorted(selected))
                  fh.write(f"targets={joined}\n")
                  fh.write("mode=targeted\n")
              else:
                  fh.write("targets=tests/test_mcp_serve.py\n")
                  fh.write("mode=fallback\n")
          PY

      - name: Run tests (pull request: targeted)
        if: github.event_name == 'pull_request'
        run: |
          source .venv/bin/activate
          echo "PR test mode: ${{ steps.pr_tests.outputs.mode }}"
          echo "Targets: ${{ steps.pr_tests.outputs.targets }}"
          python -m pytest ${{ steps.pr_tests.outputs.targets }} -q --tb=short -n auto
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

      - name: Run tests (push: full suite)
        if: github.event_name != 'pull_request'
        run: |
          source .venv/bin/activate
          python -m pytest tests/ -q --ignore=tests/integration --ignore=tests/e2e --tb=short -n auto
        env:
          # Ensure tests don't accidentally call real APIs
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          uv venv .venv --python 3.11
          source .venv/bin/activate
          uv pip install -e ".[all,dev]"

      - name: Run e2e tests
        run: |
          source .venv/bin/activate
          python -m pytest tests/e2e/ -v --tb=short
        env:
          OPENROUTER_API_KEY: ""
          OPENAI_API_KEY: ""
          NOUS_API_KEY: ""
